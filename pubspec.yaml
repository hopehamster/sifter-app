name: sifter
description: Location-based Chat App

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  google_maps_flutter: ^2.3.0
  location: ^5.0.0
  provider: ^6.0.5
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.2.0
  flutter_riverpod: ^2.4.5
  riverpod_annotation: ^2.3.0

  # Pin Firebase to compatible versions
  firebase_core: 2.15.1
  firebase_auth: 4.6.3
  firebase_database: 10.2.5
  firebase_messaging: 14.6.3

  image_picker: ^1.0.4
  path_provider: ^2.1.1
  flutter_local_notifications: ^15.1.0+1
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  share_plus: ^7.1.0
  url_launcher: ^6.1.14
  connectivity_plus: ^4.0.2
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  flutter_quill: ^7.4.4
  flutter_keyboard_visibility: ^5.4.1
  flutter_background_service: ^3.0.1
  emoji_picker_flutter: ^1.6.1
  audio_session: ^0.1.16
  audioplayers: ^5.1.0
  path: ^1.8.3
  just_audio: ^0.9.35
  logger: ^2.0.2
  flutter_dotenv: ^5.1.0
  device_info_plus: ^9.0.3
  google_mobile_ads: ^3.0.0
  
  # Fix file_picker by using file_selector for desktop
  file_picker: ^5.5.0
  file_selector: ^1.0.1
  
  app_settings: ^5.0.0
  record: ^5.0.1
  flutter_svg: ^2.0.7
  timeago: ^3.6.0
  uuid: ^3.0.7 # Downgraded to be compatible with sentry
  visibility_detector: ^0.4.0+2
  workmanager: ^0.5.2
  lottie: ^2.6.0
  smooth_page_indicator: ^1.1.0
  
  # Removing Sentry temporarily as it's causing build issues
  # sentry_flutter: 7.9.0
  
  retry: ^3.1.2
  flutter_colorpicker: ^1.0.3
  flutter_animate: ^4.3.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  youtube_player_flutter: ^8.1.2
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  integration_test:
    sdk: flutter
  mockito: ^5.4.2
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.2
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
